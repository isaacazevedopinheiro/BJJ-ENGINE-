<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Importando o CSS da Home para manter o padrão -->
    <link rel="stylesheet" href="../Site/assets/styles/home.css">
    <!-- CSS específico do Login que criaremos abaixo -->
    <link rel="stylesheet" href="./css/login_bjj.css">
    <title>BJJ ENGINE - Login</title>
</head>

<body>
    <header>
        <div class="navbar">
            <div class="nav-logo">
                <h1>BJJ <span>ENGINE</span></h1>
            </div>
            <div class="nav-links">
                <ul>
                    <li><a href="../Site/home.html">Home</a></li>
                  
                    <li><a href="./formulario.html">Formulário</a></li>
                </ul>
            </div>
            <div><a href="./cadastro.html"><button class="btn-nav">Cadastrar</button></a></div>
        </div>
    </header>

    <main class="container-login">
        <div class="card-login">
            <div class="title-login">
                <h2>Acesse sua <span>Conta</span></h2>
                <p>Pronto para mais um treino?</p>
            </div>

            <div class="formulario">
                <div class="campo">
                    <span>E-mail</span>
                    <input id="email_input" type="text" placeholder="seu@email.com">
                </div>
                <div class="campo">
                    <span>Senha</span>
                    <input id="senha_input" type="password" placeholder="******">
                </div>
                <button class="btn-acessar" onclick="entrar()">Entrar no Tatame</button>
            </div>

            <div id="div_aguardar" class="loading-div">
                <i class="fa-solid fa-circle-notch fa-spin"></i>
            </div>
            <div id="div_erros_login"></div>
        </div>
    </main>

    <footer>
        <div class="divisao-footer">
            <h3>© 2026 - SPTECH - ISAAC AZEVEDO</h3>
        </div>
    </footer>

    <script>
        // Mantenha sua lógica de script do entrar() aqui
    </script>
</body>
</html>

<script>


    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
